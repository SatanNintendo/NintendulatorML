name: Build NintendulatorML

on:
  workflow_dispatch:  # ← только ручной запуск!

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Build project
      run: msbuild msvc140/Nintendulator.vcxproj /p:Configuration=Release /p:Platform=Win32
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NintendulatorML
        path: |
          Release/*.exe
          Release/*.dll
          Lang/*.lng
