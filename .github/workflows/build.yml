name: Build NintendulatorML

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019   # Самый стабильный для v140 + Win7

    strategy:
      matrix:
        platform: [Win32, x64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build project
      run: |
        msbuild msvc140/Nintendulator.vcxproj /t:Rebuild `
          /p:Configuration=Release `
          /p:Platform=${{ matrix.platform }} `
          /p:PlatformToolset=v140 `
          /p:WindowsTargetPlatformVersion=10.0

    - name: Create release folder
      run: New-Item -ItemType Directory -Force -Path release

    - name: Copy files to release
      run: |
        Copy-Item "msvc140/${{ matrix.platform }}/Release/*.exe" release/ -Force
        Get-ChildItem -Recurse *.dll | Copy-Item -Destination release/ -Force
        Copy-Item Lang release/Lang -Recurse -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NintendulatorML-${{ matrix.platform }}
        path: release
